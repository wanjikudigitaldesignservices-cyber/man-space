<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>MAN-SPACE Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#0f0f0f;color:#e2e8f0}h1,h2{font-family:'Russo One',sans-serif;letter-spacing:1px}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#111}.lb{background:#1a1a1a;padding:50px;border:1px solid #333;border-radius:4px;max-width:400px;width:100%;text-align:center;box-shadow:0 15px 40px rgba(0,0,0,0.5)}.lb h2{color:#fff;margin-bottom:24px;font-size:1.8rem}.lb input{width:100%;padding:14px;border:1px solid #333;background:#111;color:#fff;border-radius:4px;margin-bottom:15px;font-size:1rem;font-family:'Inter',sans-serif}.lb button{width:100%;padding:14px;background:#8B5A2B;color:white;border:none;border-radius:4px;font-weight:600;cursor:pointer;font-size:1rem;font-family:'Russo One',sans-serif;text-transform:uppercase;letter-spacing:1px;transition:0.3s}.lb button:hover{background:#6e4722}
.dash{display:none}.dh{background:#111;color:white;padding:25px 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;border-bottom:1px solid #333}.dh h1{font-size:1.6rem;color:#8B5A2B}.dh button,.dh a{padding:10px 24px;border-radius:4px;border:1px solid #8B5A2B;cursor:pointer;font-size:0.85rem;color:#8B5A2B;background:transparent;text-decoration:none;font-family:'Russo One',sans-serif;text-transform:uppercase;letter-spacing:1px;transition:0.3s}.dh button:hover,.dh a:hover{background:#8B5A2B;color:white}.be{background:#8B5A2B!important;color:white!important}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:30px;padding:40px}.sc{background:#111;padding:30px;border-radius:4px;border:1px solid #333;border-left:4px solid #8B5A2B}.sl{font-size:0.85rem;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;font-weight:600}.sv{font-size:2.8rem;font-family:'Russo One',sans-serif;margin-top:10px;color:#fff}
.tw{padding:0 40px 40px;overflow-x:auto}table{width:100%;border-collapse:collapse;background:#111;border-radius:4px;overflow:hidden;border:1px solid #333}th{background:#1a1a1a;color:#94a3b8;padding:20px;text-align:left;font-size:0.85rem;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #333}td{padding:18px 20px;border-bottom:1px solid #222;font-size:0.95rem}
select.st{padding:8px 12px;border:1px solid #333;border-radius:4px;font-family:'Inter',sans-serif;background:#0f0f0f;color:#fff;outline:none}.del{background:none;border:none;color:#ef4444;cursor:pointer;font-size:0.85rem;text-transform:uppercase;letter-spacing:1px;font-weight:600;font-family:'Russo One',sans-serif}
@media(max-width:768px){.stats{grid-template-columns:1fr}}</style></head>
<body>
<div class="login" id="ls"><div class="lb"><h2>MAN-SPACE Admin</h2><input type="text" id="u" value="admin"><input type="password" id="p" placeholder="Password"><button onclick="login()">Enter System</button></div></div>
<div class="dash" id="dash">
<div class="dh"><h1>Lounge Control</h1><div><button class="be" onclick="exp()">Export</button> <a href="index.html">View Site</a> <button onclick="logout()">Logout</button></div></div>
<div class="stats"><div class="sc"><div class="sl">Total Bookings</div><div class="sv" id="st">0</div></div><div class="sc"><div class="sl">Pending</div><div class="sv" id="sn" style="color:#8B5A2B">0</div></div><div class="sc"><div class="sl">Confirmed</div><div class="sv" id="sd" style="color:#10b981">0</div></div></div>
<div class="tw"><table><thead><tr><th>Date Rec'd</th><th>Client</th><th>Phone</th><th>Service</th><th>Barber</th><th>Pref Date</th><th>Time</th><th>Status</th><th></th></tr></thead><tbody id="tb"></tbody></table></div></div>
<script>
const K='manspace_bookings';if(sessionStorage.getItem('manspace_admin')==='true')showD();
function login(){if(document.getElementById('u').value==='admin'&&document.getElementById('p').value==='admin123'){sessionStorage.setItem('manspace_admin','true');showD()}else alert('Invalid credentials')}
function logout(){sessionStorage.removeItem('manspace_admin');location.reload()}
function showD(){document.getElementById('ls').style.display='none';document.getElementById('dash').style.display='block';render()}
function gd(){return JSON.parse(localStorage.getItem(K)||'[]').sort((a,b)=>new Date(b.submittedAt)-new Date(a.submittedAt))}
function sv(d){localStorage.setItem(K,JSON.stringify(d))}
function render(){const d=gd();document.getElementById('st').textContent=d.length;document.getElementById('sn').textContent=d.filter(x=>x.status==='Pending').length;document.getElementById('sd').textContent=d.filter(x=>x.status==='Confirmed').length;
document.getElementById('tb').innerHTML=d.map(i=>`<tr><td>${new Date(i.submittedAt).toLocaleDateString('en-GB')}</td><td><strong>${i.name||'—'}</strong></td><td>${i.phone||'—'}</td><td>${i.service||'—'}</td><td>${i.barber||'—'}</td><td>${i.date||'—'}</td><td>${i.time||'—'}</td><td><select class="st" onchange="upd(${i.id},this.value)">${['Pending','Contacted','Confirmed','Completed'].map(s=>`<option ${i.status===s?'selected':''}>${s}</option>`).join('')}</select></td><td><button class="del" onclick="del(${i.id})">Drop</button></td></tr>`).join('')}
function upd(id,s){const d=gd();const i=d.find(x=>x.id===id);if(i){i.status=s;sv(d);render()}}
function del(id){if(!confirm('Drop this booking?'))return;sv(gd().filter(x=>x.id!==id));render()}
function exp(){const d=gd();if(!d.length)return alert('No data');const h=['Received','Name','Phone','Service','Barber','Pref Date','Time','Status'];const r=d.map(i=>[new Date(i.submittedAt).toLocaleDateString(),i.name,i.phone,i.service,i.barber,i.date,i.time,i.status]);const c=[h,...r].map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');const b=new Blob([c],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='manspace_bookings.csv';a.click()}
document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
</script></body></html>
